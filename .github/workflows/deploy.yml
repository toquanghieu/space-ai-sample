name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push images to GHCR
    env:
      PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/logistics-api:latest
            ${{ env.IMAGE_PREFIX }}/logistics-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/logistics-web:latest
            ${{ env.IMAGE_PREFIX }}/logistics-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build & push Proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/proxy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/logistics-proxy:latest
            ${{ env.IMAGE_PREFIX }}/logistics-proxy:${{ github.sha }}
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

      - name: Trigger Portainer redeploy (webhook)
        if: ${{ env.PORTAINER_WEBHOOK_URL != '' }}
        run: curl -fsS -X POST "$PORTAINER_WEBHOOK_URL"
