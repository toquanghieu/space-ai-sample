# Self-hosted stack for Portainer (Stacks → Add stack → paste / point to repo).
# One reverse proxy in front; frontend and backend share a single origin via /api.
# The proxy takes a dedicated LAN IP on the existing macvlan network (no host port).
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3001"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    expose:
      - "3001"
    networks:
      - internal
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Server-side (SSR) reaches the API over the internal docker network.
      # The browser uses the relative /api path (proxied by nginx) — no CORS.
      INTERNAL_API_BASE_URL: http://api:3001/api
    expose:
      - "3000"
    networks:
      - internal
    depends_on:
      - api
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      # internal: to reach web/api by service name (docker DNS)
      internal: {}
      # lan (macvlan): gives the proxy its own LAN IP → browse http://10.10.10.63
      lan:
        ipv4_address: ${PROXY_IP:-10.10.10.63}
    depends_on:
      - web
      - api
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  lan:
    external: true
    name: ${LAN_NETWORK:-net1010}
