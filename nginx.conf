# Reverse proxy: single origin, /api/* → NestJS, everything else → Next.js.
# Mounted into the nginx proxy container at /etc/nginx/nginx.conf.
events {}

http {
  upstream web_upstream { server web:3000; }
  upstream api_upstream { server api:3001; }

  server {
    listen 80;

    # /api/* → NestJS (path forwarded as-is; Nest uses the /api global prefix)
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js
    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
