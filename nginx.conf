# Reverse proxy: single origin, /api/* → NestJS, everything else → Next.js.
# Baked into the proxy image at /etc/nginx/nginx.conf.
events {}

http {
  upstream web_upstream { server web:3000; }
  upstream api_upstream { server api:3001; }

  server {
    listen 80;

    # Optional HTTP Basic Auth: the entrypoint writes /etc/nginx/auth/basic.conf
    # only when BASIC_AUTH_USER + BASIC_AUTH_PASSWORD are set (else this glob is
    # empty → no auth). Applied at server level → protects both the app and /api.
    include /etc/nginx/auth/*.conf;

    # /api/* → NestJS (path forwarded as-is; Nest uses the /api global prefix)
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js
    location / {
      proxy_pass http://web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
